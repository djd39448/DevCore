<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>DevCore — agent harness</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>

<!-- Type — calm editorial pairing: serif display, geist body, geist mono -->
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400;1,8..60,500&family=Geist:wght@400;450;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet"/>

<link rel="stylesheet" href="styles.css"/>

<style>
  /* Auto-scale the 1280×820 window to fit any viewport */
  .dc-stage {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: #0a0907;
    overflow: hidden;
  }
  .dc-stage > .dc-fit { transform-origin: center center; }
</style>
</head>
<body>

<div id="root"></div>

<!-- React + Babel (pinned) -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Tweaks panel (host protocol + controls) -->
<script type="text/babel" src="tweaks-panel.jsx"></script>

<!-- Views -->
<script type="text/babel" src="live-run.jsx"></script>
<script type="text/babel" src="views.jsx"></script>
<script type="text/babel" src="chat.jsx"></script>

<!-- App shell -->
<script type="text/babel" src="app.jsx"></script>

<!-- Boot + responsive scale -->
<script type="text/babel">
  function Stage() {
    const ref = React.useRef(null);
    const [scale, setScale] = React.useState(1);
    React.useEffect(() => {
      const fit = () => {
        const vw = window.innerWidth, vh = window.innerHeight;
        const s = Math.min(vw / 1280, vh / 820, 1);
        setScale(s);
      };
      fit();
      window.addEventListener('resize', fit);
      return () => window.removeEventListener('resize', fit);
    }, []);
    return (
      <div className="dc-stage">
        <div className="dc-fit" style={{ transform: `scale(${scale})`, width: 1280, height: 820 }}>
          <App/>
        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<Stage/>);
</script>
</body>
</html>
