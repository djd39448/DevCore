# golangci-lint configuration for DevCore.
# The linter set is mandated by CODING_STANDARDS.md dc-02. errcheck, govet,
# ineffassign, staticcheck, and unused are golangci-lint defaults; the linters
# below are the additional ones dc-02 requires.
version: "2"

linters:
  enable:
    - bodyclose
    - contextcheck
    - errorlint
    - gocritic
    - gosec
    - nilerr
    - noctx
    - revive

formatters:
  enable:
    - gofumpt
